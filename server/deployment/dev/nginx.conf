upstream backend {
    server host.docker.internal:4000;
}

upstream frontend {
	server host.docker.internal:3000;
}

server {
    listen 80;

    server_name localhost;

    # Frontend
    location / {
        proxy_pass http://frontend;
        include proxy_params;
    }

    # Backend
    location /api/v1/ {
        proxy_pass http://backend;
        include proxy_params;
    }
}
